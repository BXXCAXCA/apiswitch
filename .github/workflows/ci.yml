name: CI

on:
  push:
    branches:
      - main
      - agent/complete-protocol-support
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (Windows)
    runs-on: windows-latest
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests
        run: python -m pytest backend/tests -q
      - name: Run Ruff fatal checks
        run: python -m ruff check backend --select F,E9

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test
      - name: Build frontend
        run: npm run build

  package-windows:
    name: Windows one-file package
    needs:
      - backend
      - frontend
    runs-on: windows-latest
    env:
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements.txt -r requirements-dev.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build APISwitch.exe
        shell: pwsh
        run: ./scripts/package-desktop.ps1 -Clean
      - name: Record SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ./dist/APISwitch.exe).Hash
          "${hash}  APISwitch.exe" | Set-Content -Encoding ascii ./dist/APISwitch.sha256.txt
          Get-Item ./dist/APISwitch.exe | Select-Object Name, Length
          Get-Content ./dist/APISwitch.sha256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: APISwitch-windows-x64
          path: |
            dist/APISwitch.exe
            dist/APISwitch.sha256.txt
          if-no-files-found: error
          retention-days: 14
